{{ define "main" }}
<div class="hero bg-base-200 rounded-box p-10 mb-8">
  <div class="hero-content text-center">
    <div class="max-w-md">
      <h1 class="text-5xl font-bold">{{ .Title }}</h1>
      <p class="py-6">{{ .Content }}</p>
      <button class="btn btn-primary">Conoce más</button>
    </div>
  </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
  <!-- Card 1 -->
  <div class="card bg-base-100 shadow-xl border border-base-200">
    <div class="card-body">
      <h2 class="card-title">Ingeniería</h2>
      <p>Desarrollo de software de alto rendimiento y consultoría avanzada.</p>
      <div class="card-actions justify-end mt-4">
        <button class="btn btn-outline btn-sm">Ver servicios</button>
      </div>
    </div>
  </div>
  
  <!-- Card 2 -->
  <div class="card bg-base-100 shadow-xl border border-base-200">
    <div class="card-body">
      <h2 class="card-title">Entrenamiento</h2>
      <p>Cursos inmersivos en Go, Rust, y Arquitectura de Sistemas.</p>
      <div class="card-actions justify-end mt-4">
        <button class="btn btn-outline btn-sm">Explorar cursos</button>
      </div>
    </div>
  </div>

  <!-- Card 3 -->
  <div class="card bg-base-100 shadow-xl border border-base-200">
    <div class="card-body">
      <h2 class="card-title">Comunidad</h2>
      <p>Únete a nuestra red global de ingenieros de software.</p>
      <div class="card-actions justify-end mt-4">
        <button class="btn btn-outline btn-sm">Unirme</button>
      </div>
    </div>
  </div>
</div>
{{ end }}
